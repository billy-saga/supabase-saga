name: Supabase Log Retention Cleanup

on:
  schedule:
    - cron: '0 6 * * *' # diário às 06:00 UTC (ajuste se preciso)
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@2

      - name: Run Supabase Cleanup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RETENTION_DAYS: '90'
          BATCH_SIZE: '1000'
        run: node ./scripts/supabase_cleanup.js
